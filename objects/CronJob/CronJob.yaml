A CronJob in Kubernetes is used to run Jobs on a schedule (like Linux cron).

┌───────────── minute (0 - 59)
│ ┌───────────── hour (0 - 23)
│ │ ┌───────────── day of month (1 - 31)
│ │ │ ┌───────────── month (1 - 12)
│ │ │ │ ┌───────────── day of week (0 - 6)
│ │ │ │ │
* * * * *
Schedule	Meaning
* * * * *	Every minute
0 * * * *	Every hour
0 0 * * *	Daily at midnight
0 0 * * 0	Every Sunday

apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob
spec:
  schedule: "* * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello
              image: busybox
              command: ["sh", "-c", "echo Hello from CronJob"]
          restartPolicy: Never
